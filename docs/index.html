<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Terraflux — energy flux globe</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #000308; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        color: #e8eef5;
        overflow: hidden;
      }
      #globe { position: fixed; inset: 0; }
      .panel {
        position: fixed;
        top: 0; left: 0; right: 0;
        padding: 1rem 1.25rem;
        background: linear-gradient(#000308cc, #00030800);
        pointer-events: none;
      }
      h1 { font-size: 1.1rem; margin: 0; }
      p.lede {
        color: #9fb2c6; margin: 0.3rem 0 0; font-size: 0.85rem; max-width: 62ch;
      }
      p.lede a { color: #ffd27f; pointer-events: auto; }
      #status { font-family: ui-monospace, monospace; color: #7f94aa; font-size: 0.78rem; margin-top: 0.3rem; }
      .label { font: 600 12px ui-sans-serif, system-ui, sans-serif; color: #fff; text-shadow: 0 1px 3px #000; white-space: nowrap; }
      .label small { display: block; font-weight: 400; color: #ffd0b8; }
    </style>
  </head>
  <body>
    <div id="globe"></div>
    <div class="panel">
      <h1>Terraflux — observed fossil-energy flux</h1>
      <p class="lede">
        Laden-capacity energy transiting each gate on 2026-07-17, queried in-browser
        with DuckDB-WASM. Bar height ∝ energy; the arc traces the laden flow.
        Observed telemetry-derived estimate, not measured cargo.
        <a href="flat.html">2D map</a> · <a href="table.html">table</a>
      </p>
      <p id="status">Booting…</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
    <script type="module">
      const status = document.getElementById("status");
      const setStatus = (m) => (status.textContent = m);

      const DUCKDB_VERSION = "1.31.0";
      const DIST = `https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@${DUCKDB_VERSION}/dist`;
      const TEX = "https://unpkg.com/three-globe/example/img";

      const FLUX_QUERY = `
        SELECT
          gate,
          CAST(round(sum(energy_gj) FILTER (WHERE laden)) AS BIGINT) AS energy_gj,
          count(*) FILTER (WHERE laden) AS laden_crossings
        FROM read_parquet('crossings.parquet')
        WHERE event_date = DATE '2026-07-17'
        GROUP BY gate`;

      async function queryFlux() {
        const duckdb = await import(
          `https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@${DUCKDB_VERSION}/+esm`
        );
        const workerUrl = URL.createObjectURL(
          new Blob([`importScripts("${DIST}/duckdb-browser-mvp.worker.js");`], {
            type: "text/javascript",
          }),
        );
        const db = new duckdb.AsyncDuckDB(new duckdb.VoidLogger(), new Worker(workerUrl));
        await db.instantiate(`${DIST}/duckdb-mvp.wasm`);
        const url = new URL("crossings.parquet", location.href).href;
        await db.registerFileURL("crossings.parquet", url, duckdb.DuckDBDataProtocol.HTTP, false);
        const conn = await db.connect();
        const rows = (await conn.query(FLUX_QUERY)).toArray().map((r) => {
          const o = r.toJSON();
          return { gate: o.gate, energy_gj: Number(o.energy_gj), laden: Number(o.laden_crossings) };
        });
        await conn.close();
        return new Map(rows.map((r) => [r.gate, r]));
      }

      // Great-circle destination point from (lat, lon) along a bearing.
      function destination(lat, lon, bearingDeg, distDeg) {
        const d = (distDeg * Math.PI) / 180;
        const t = (bearingDeg * Math.PI) / 180;
        const p1 = (lat * Math.PI) / 180;
        const l1 = (lon * Math.PI) / 180;
        const p2 = Math.asin(
          Math.sin(p1) * Math.cos(d) + Math.cos(p1) * Math.sin(d) * Math.cos(t),
        );
        const l2 =
          l1 +
          Math.atan2(
            Math.sin(t) * Math.sin(d) * Math.cos(p1),
            Math.cos(d) - Math.sin(p1) * Math.sin(p2),
          );
        return [(p2 * 180) / Math.PI, (((l2 * 180) / Math.PI + 540) % 360) - 180];
      }

      async function main() {
        setStatus("Querying flux with DuckDB-WASM…");
        const [flux, gates] = await Promise.all([
          queryFlux(),
          fetch("gates.json").then((r) => r.json()),
        ]);

        const points = gates
          .map((g) => {
            const f = flux.get(g.name) ?? { energy_gj: 0, laden: 0 };
            return { ...g, pj: f.energy_gj / 1e6, laden: f.laden };
          })
          .filter((p) => p.pj > 0);
        const maxPJ = Math.max(...points.map((p) => p.pj), 1);
        const arcs = points.map((p) => {
          const [elat, elng] = destination(p.lat, p.lon, p.outbound_bearing_deg, 9);
          return { slat: p.lat, slng: p.lon, elat, elng };
        });

        setStatus("Rendering globe…");
        const world = Globe()(document.getElementById("globe"))
          .backgroundColor("#000308")
          .globeImageUrl(`${TEX}/earth-night.jpg`)
          .bumpImageUrl(`${TEX}/earth-topology.png`)
          .backgroundImageUrl(`${TEX}/night-sky.png`)
          .showAtmosphere(true)
          .atmosphereColor("#4a90d9")
          .atmosphereAltitude(0.18)
          // Energy bars.
          .pointsData(points)
          .pointLat("lat")
          .pointLng("lon")
          .pointColor(() => "#ff7a45")
          .pointAltitude((d) => 0.02 + (d.pj / maxPJ) * 0.45)
          .pointRadius(0.55)
          .pointsMerge(false)
          // Flow arcs.
          .arcsData(arcs)
          .arcStartLat("slat")
          .arcStartLng("slng")
          .arcEndLat("elat")
          .arcEndLng("elng")
          .arcColor(() => ["rgba(255,210,127,0.15)", "rgba(255,210,127,0.95)"])
          .arcStroke(0.6)
          .arcDashLength(0.5)
          .arcDashGap(0.25)
          .arcDashAnimateTime(2200)
          .arcAltitudeAutoScale(0.4)
          // HTML labels.
          .htmlElementsData(points)
          .htmlLat("lat")
          .htmlLng("lon")
          .htmlAltitude((d) => 0.04 + (d.pj / maxPJ) * 0.45)
          .htmlElement((d) => {
            const el = document.createElement("div");
            el.className = "label";
            el.innerHTML = `${d.name.replace(/_/g, " ")}<small>${d.pj.toFixed(1)} PJ · ${d.laden} laden</small>`;
            return el;
          });

        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.5;
        world.pointOfView({ lat: 18, lng: 74, altitude: 2.3 }, 0);

        const resize = () =>
          world.width(window.innerWidth).height(window.innerHeight);
        resize();
        window.addEventListener("resize", resize);

        const totalPJ = points.reduce((s, p) => s + p.pj, 0);
        setStatus(`${points.length} gates · ${totalPJ.toFixed(1)} PJ observed on 2026-07-17 · drag to rotate`);
      }

      main().catch((e) => {
        console.error(e);
        setStatus(`Error: ${e?.message ?? e}`);
      });
    </script>
  </body>
</html>
