<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Terraflux — energy flux map</title>
    <style>
      :root { color-scheme: light; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        margin: 0;
        background: #0b1622;
        color: #e8eef5;
      }
      header { padding: 1rem 1.25rem 0; }
      h1 { font-size: 1.15rem; margin: 0; }
      p.lede { color: #9fb2c6; margin: 0.3rem 0 0; font-size: 0.9rem; max-width: 60ch; }
      #status { font-family: ui-monospace, monospace; color: #7f94aa; font-size: 0.8rem; }
      #map { width: 100%; height: auto; display: block; }
      .ocean { fill: #10202f; }
      .land { fill: #21384c; stroke: #2c4a63; stroke-width: 0.4; }
      .graticule { fill: none; stroke: #1a2f42; stroke-width: 0.4; }
      .gate-flow { stroke: #ffd27f; stroke-width: 2; }
      .gate-bubble { fill: #ff7a45; fill-opacity: 0.75; stroke: #ffd9c4; stroke-width: 1; }
      .gate-label { fill: #e8eef5; font-size: 11px; font-weight: 600; }
      .gate-sub { fill: #9fb2c6; font-size: 10px; }
      .legend { fill: #9fb2c6; font-size: 11px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Terraflux — observed fossil-energy flux</h1>
      <p class="lede">
        Laden-capacity energy transiting each gate on 2026-07-17, queried in-browser
        with DuckDB-WASM. Bubble area ∝ energy; the arrow points along the laden flow.
        Observed telemetry-derived estimate, not measured cargo.
      </p>
      <p id="status">Booting…</p>
    </header>
    <svg id="map" viewBox="0 0 960 500" preserveAspectRatio="xMidYMid meet"></svg>

    <script type="module">
      import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
      import * as topojson from "https://cdn.jsdelivr.net/npm/topojson-client@3/+esm";

      const DUCKDB_VERSION = "1.31.0";
      const DIST = `https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@${DUCKDB_VERSION}/dist`;
      const WORLD_URL =
        "https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json";

      const status = document.getElementById("status");
      const setStatus = (m) => (status.textContent = m);

      const FLUX_QUERY = `
        SELECT
          gate,
          CAST(round(sum(energy_gj) FILTER (WHERE laden)) AS BIGINT) AS energy_gj,
          count(*) FILTER (WHERE laden) AS laden_crossings
        FROM read_parquet('crossings.parquet')
        WHERE event_date = DATE '2026-07-17'
        GROUP BY gate`;

      async function queryFlux() {
        const duckdb = await import(
          `https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@${DUCKDB_VERSION}/+esm`
        );
        const workerUrl = URL.createObjectURL(
          new Blob([`importScripts("${DIST}/duckdb-browser-mvp.worker.js");`], {
            type: "text/javascript",
          }),
        );
        const db = new duckdb.AsyncDuckDB(new duckdb.VoidLogger(), new Worker(workerUrl));
        await db.instantiate(`${DIST}/duckdb-mvp.wasm`);
        const url = new URL("crossings.parquet", location.href).href;
        await db.registerFileURL("crossings.parquet", url, duckdb.DuckDBDataProtocol.HTTP, false);
        const conn = await db.connect();
        const rows = (await conn.query(FLUX_QUERY)).toArray().map((r) => {
          const o = r.toJSON();
          return { gate: o.gate, energy_gj: Number(o.energy_gj), laden: Number(o.laden_crossings) };
        });
        await conn.close();
        return new Map(rows.map((r) => [r.gate, r]));
      }

      async function main() {
        setStatus("Querying flux with DuckDB-WASM…");
        const [flux, gates, world] = await Promise.all([
          queryFlux(),
          fetch("gates.json").then((r) => r.json()),
          fetch(WORLD_URL).then((r) => r.json()),
        ]);
        setStatus("Rendering…");

        const svg = d3.select("#map");
        const W = 960, H = 500;
        const projection = d3.geoEquirectangular().fitExtent(
          [[8, 8], [W - 8, H - 8]],
          { type: "Sphere" },
        );
        const path = d3.geoPath(projection);

        svg.append("path").attr("class", "ocean").attr("d", path({ type: "Sphere" }));
        svg.append("path").attr("class", "graticule").attr("d", path(d3.geoGraticule10()));
        const land = topojson.feature(world, world.objects.countries);
        svg.append("path").attr("class", "land").attr("d", path(land));

        // Arrowhead marker.
        svg
          .append("defs")
          .append("marker")
          .attr("id", "arrow")
          .attr("viewBox", "0 0 10 10")
          .attr("refX", 8)
          .attr("refY", 5)
          .attr("markerWidth", 6)
          .attr("markerHeight", 6)
          .attr("orient", "auto-start-reverse")
          .append("path")
          .attr("d", "M0,0 L10,5 L0,10 z")
          .attr("fill", "#ffd27f");

        const points = gates
          .map((g) => ({ ...g, ...(flux.get(g.name) ?? { energy_gj: 0, laden: 0 }) }))
          .filter((g) => g.energy_gj > 0);

        const maxPJ = d3.max(points, (g) => g.energy_gj / 1e6) || 1;
        const radius = d3.scaleSqrt().domain([0, maxPJ]).range([3, 34]);

        const g = svg.append("g");
        for (const gate of points) {
          const [x, y] = projection([gate.lon, gate.lat]);
          const pj = gate.energy_gj / 1e6;
          const r = radius(pj);

          // Flow arrow along the outbound bearing (0=N, clockwise).
          const b = (gate.outbound_bearing_deg * Math.PI) / 180;
          const len = r + 22;
          const x2 = x + Math.sin(b) * len;
          const y2 = y - Math.cos(b) * len;
          g.append("line")
            .attr("class", "gate-flow")
            .attr("x1", x).attr("y1", y).attr("x2", x2).attr("y2", y2)
            .attr("marker-end", "url(#arrow)");

          g.append("circle").attr("class", "gate-bubble").attr("cx", x).attr("cy", y).attr("r", r);
          g.append("text").attr("class", "gate-label").attr("x", x + r + 6).attr("y", y - 2)
            .text(gate.name.replace(/_/g, " "));
          g.append("text").attr("class", "gate-sub").attr("x", x + r + 6).attr("y", y + 11)
            .text(`${pj.toFixed(1)} PJ · ${gate.laden} laden`);
        }

        // Size legend.
        const legend = svg.append("g").attr("transform", `translate(24, ${H - 70})`);
        legend.append("text").attr("class", "legend").attr("y", -10).text("energy / day");
        [Math.round(maxPJ), Math.round(maxPJ / 3)].forEach((pj, i) => {
          const r = radius(pj);
          const cx = 16 + i * 90;
          legend.append("circle").attr("class", "gate-bubble").attr("cx", cx).attr("cy", 0).attr("r", r);
          legend.append("text").attr("class", "legend").attr("x", cx).attr("y", 30)
            .attr("text-anchor", "middle").text(`${pj} PJ`);
        });

        const totalPJ = d3.sum(points, (g) => g.energy_gj / 1e6);
        setStatus(`${points.length} gates · ${totalPJ.toFixed(1)} PJ observed on 2026-07-17`);
      }

      main().catch((e) => {
        console.error(e);
        setStatus(`Error: ${e?.message ?? e}`);
      });
    </script>
  </body>
</html>
