name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  hormuz-flow:
    name: Hormuz flow experiment
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: experiments/hormuz-flow

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          enable-cache: true
          cache-dependency-glob: experiments/hormuz-flow/uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check .

      - name: Verify experiment
        run: uv run python -m unittest discover -p "test_*.py"
